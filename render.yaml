services:
  - type: web
    name: lightsite-api
    runtime: node
    plan: free
    region: oregon
    autoDeploy: true
    rootDir: .
    buildCommand: pnpm install --frozen-lockfile && PLAYWRIGHT_BROWSERS_PATH=0 pnpm --filter @lightsite/api exec playwright install chromium --only-shell && pnpm --filter @lightsite/api build
    startCommand: pnpm --filter @lightsite/db db:migrate && pnpm --filter @lightsite/api start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22.16.0
      - key: NODE_ENV
        value: production
      - key: API_PORT
        value: 10000
      - key: API_JSON_BODY_LIMIT
        value: 256kb
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: "0"
      - key: DATABASE_POOL_MAX
        value: 5
      - key: TRUST_PROXY
        value: true
      - key: WEB_ORIGIN
        value: https://lightsite-bfi.pages.dev
      - key: WEB_ORIGINS
        value: https://lightsite-bfi.pages.dev,https://lightsite.io
      - key: PUBLIC_SITE_ORIGIN
        value: https://lightsite.io
      - key: BETTER_AUTH_URL
        value: https://lightsite-bfi.pages.dev
      - key: BETTER_AUTH_SECRET
        generateValue: true
      - key: TRACKING_SIGNING_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: LOGO_DEV_TOKEN
        sync: false
