services:
  - type: web
    name: handout-api
    runtime: node
    plan: free
    region: oregon
    autoDeploy: true
    rootDir: .
    buildCommand: pnpm install --frozen-lockfile && PLAYWRIGHT_BROWSERS_PATH=0 pnpm --filter @handout/api exec playwright install chromium --only-shell && pnpm --filter @handout/api build
    startCommand: pnpm --filter @handout/api start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22.16.0
      - key: NODE_ENV
        value: production
      - key: API_PORT
        value: 10000
      - key: API_JSON_BODY_LIMIT
        value: 256kb
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: "0"
      - key: DATABASE_POOL_MAX
        value: 5
      - key: TRUST_PROXY
        value: true
      - key: WEB_ORIGIN
        value: https://app.handout.link
      - key: WEB_ORIGINS
        value: https://app.handout.link,https://handout.link
      - key: PUBLIC_SITE_ORIGIN
        value: https://handout.link
      - key: BETTER_AUTH_URL
        value: https://app.handout.link
      - key: BETTER_AUTH_SECRET
        generateValue: true
      - key: EMAIL_FROM
        value: Handout <noreply@handout.link>
      - key: RESEND_API_KEY
        sync: false
      - key: TRACKING_SIGNING_SECRET
        generateValue: true
      - key: TRACKING_V2_ENABLED
        value: true
      - key: TRACKING_RETENTION_MODE
        value: external
      - key: AUTOMATIONS_ENABLED
        value: true
      - key: AUTOMATIONS_WORKER_MODE
        value: external
      - key: AUTOMATIONS_ENCRYPTION_KEY
        sync: false
      - key: TRACKING_REPLAY_STORAGE
        value: s3
      - key: TRACKING_REPLAY_S3_BUCKET
        value: handout-session-replays
      - key: TRACKING_REPLAY_S3_REGION
        value: auto
      - key: TRACKING_REPLAY_S3_ENDPOINT
        value: https://cd7d7aa51875b184a53aa5216af91cd8.r2.cloudflarestorage.com
      - key: TRACKING_REPLAY_S3_FORCE_PATH_STYLE
        value: false
      - key: TRACKING_REPLAY_S3_ACCESS_KEY_ID
        sync: false
      - key: TRACKING_REPLAY_S3_SECRET_ACCESS_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: LOGO_DEV_TOKEN
        sync: false
  - type: worker
    name: handout-automations-worker
    runtime: node
    plan: starter
    region: oregon
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter @handout/api build
    startCommand: node apps/api/dist/automation-worker.js
    envVars:
      - key: NODE_VERSION
        value: 22.16.0
      - key: NODE_ENV
        value: production
      - key: DATABASE_POOL_MAX
        value: 5
      - key: DATABASE_URL
        sync: false
      - key: AUTOMATIONS_ENABLED
        value: true
      - key: AUTOMATIONS_ENCRYPTION_KEY
        sync: false
  - type: cron
    name: handout-tracking-retention
    runtime: node
    plan: starter
    region: oregon
    schedule: "17 */6 * * *"
    buildCommand: pnpm install --frozen-lockfile
    startCommand: pnpm --filter @handout/api tracking:retention -- --batch-size 1000 --max-batches 20
    envVars:
      - key: NODE_VERSION
        value: 22.16.0
      - key: NODE_ENV
        value: production
      - key: DATABASE_POOL_MAX
        value: 2
      - key: DATABASE_URL
        sync: false
      - key: TRACKING_REPLAY_STORAGE
        value: s3
      - key: TRACKING_REPLAY_S3_BUCKET
        value: handout-session-replays
      - key: TRACKING_REPLAY_S3_REGION
        value: auto
      - key: TRACKING_REPLAY_S3_ENDPOINT
        value: https://cd7d7aa51875b184a53aa5216af91cd8.r2.cloudflarestorage.com
      - key: TRACKING_REPLAY_S3_FORCE_PATH_STYLE
        value: false
      - key: TRACKING_REPLAY_S3_ACCESS_KEY_ID
        sync: false
      - key: TRACKING_REPLAY_S3_SECRET_ACCESS_KEY
        sync: false
